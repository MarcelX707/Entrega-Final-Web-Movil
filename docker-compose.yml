services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: municipalidad_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./Backend/.env

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: municipalidad_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
