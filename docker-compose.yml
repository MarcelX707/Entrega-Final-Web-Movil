version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: municipalidad_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: municipalidad_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
